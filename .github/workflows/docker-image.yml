name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------
      # BACKEND IMAGE
      # -------------------
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      # -------------------
      # MIGRATION IMAGE
      # -------------------
      - name: Build and push migrations
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.migrate
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dental-clinic-migrate:latest
