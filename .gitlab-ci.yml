stages:
  - lint
  - build
  - test
  - docker

variables:
  GITLAB_DEPENDENCY_PROXY_DISABLED: "true"
  GOPATH: $CI_PROJECT_DIR/.go
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# ─── LINT ────────────────────────────────────────────────────────────────────

vet:
  stage: lint
  image: golang:1.24-alpine
  script:
    - go vet ./...
  cache:
    key: go-mod-$CI_COMMIT_REF_SLUG
    paths:
      - .go/pkg/mod/

# ─── BUILD ───────────────────────────────────────────────────────────────────

build:
  stage: build
  image: golang:1.24-alpine
  script:
    - apk add --no-cache git
    - go mod download
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o app ./cmd/main.go
  artifacts:
    paths:
      - app
    expire_in: 1 hour
  cache:
    key: go-mod-$CI_COMMIT_REF_SLUG
    paths:
      - .go/pkg/mod/

# ─── TEST ────────────────────────────────────────────────────────────────────

test:
  stage: test
  image: golang:1.24-alpine
  script:
    - go test ./... -v -count=1
  cache:
    key: go-mod-$CI_COMMIT_REF_SLUG
    paths:
      - .go/pkg/mod/

# ─── DOCKER BUILD & PUSH ─────────────────────────────────────────────────────

docker-build:
  stage: docker
  # Используем хостовый Docker — без dind
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker build \
        -f docker/Dockerfile \
        -t $IMAGE_NAME:$IMAGE_TAG \
        -t $IMAGE_NAME:latest \
        .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"