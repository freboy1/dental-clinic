info:
  contact: {}
  description: API for managing users, authentication, and clinic operations.
  title: Dental Clinic API
  version: "1.0"
paths:
  /api/address:
    get:
      description: Returns a list of all addresss
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AddressResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get all addresss
      tags:
      - Addresss
    post:
      consumes:
      - application/json
      description: Creates a new address
      parameters:
      - description: Address registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.CreateResponse'
      security:
      - BearerAuth: []
      summary: Create new address
      tags:
      - Addresss
  /api/address/{id}:
    delete:
      description: Deletes an address by UUID
      parameters:
      - description: Address ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.Response'
            type: array
        "404":
          description: Not Found
          schema:
            items:
              $ref: '#/definitions/dto.Response'
            type: array
      security:
      - BearerAuth: []
      summary: Delete Address
      tags:
      - Addresss
    get:
      description: Returns a single address by its UUID
      parameters:
      - description: Address ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AddressResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get address by ID
      tags:
      - Addresss
    put:
      consumes:
      - application/json
      description: Update & return status
      parameters:
      - description: Address ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Address update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.Response'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Update addresss
      tags:
      - Addresss
  /api/clinics:
    get:
      description: Returns a list of all clinics
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "500":
