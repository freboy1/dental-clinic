        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.CreateResponse'
      security:
      - BearerAuth: []
      summary: Create new address
      tags:
      - Addresss
  /api/address/{id}:
    delete:
      description: Deletes an address by UUID
      parameters:
      - description: Address ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.Response'
            type: array
        "404":
          description: Not Found
          schema:
            items:
              $ref: '#/definitions/dto.Response'
            type: array
      security:
      - BearerAuth: []
      summary: Delete Address
      tags:
      - Addresss
    get:
      description: Returns a single address by its UUID
      parameters:
      - description: Address ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AddressResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get address by ID
      tags:
      - Addresss
    put:
      consumes:
      - application/json
      description: Update & return status
      parameters:
      - description: Address ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Address update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.Response'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Update addresss
      tags:
      - Addresss
  /api/ai/chat:
    post:
      consumes:
      - application/json
      description: Processes a user chat message, updates booking state, and creates
