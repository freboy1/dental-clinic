info:
  contact: {}
  description: API for managing users, authentication, and clinic operations.
  title: Dental Clinic API
  version: "1.0"
paths:
  /api//clinics/{clinic_id}/services/{service_id}:
    delete:
      description: Delete service for a specific clinic
      parameters:
      - description: Clinic ID
        in: path
        name: clinic_id
        required: true
        type: string
      - description: Service ID
        in: path
        name: service_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ServiceActionResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete services by clinic
      tags:
      - Services
  /api/add-clinics/{id}/services:
    post:
      consumes:
      - application/json
      description: Add a new dental service (e.g. teeth cleaning, tooth extraction)
      parameters:
      - description: Clinic ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Service creation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddServiceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ServiceActionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ServiceActionResponse'
      security:
      - BearerAuth: []
      summary: Add a new service
      tags:
      - Services
  /api/address:
    get:
      description: Returns a list of all addresss
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AddressResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get all addresss
      tags:
      - Addresss
    post:
      consumes:
      - application/json
      description: Creates a new address
      parameters:
      - description: Address registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
