linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - misspell
    - noctx
    - bodyclose
    - revive

linters-settings:
  goimports:
    local-prefixes: dental_clinic
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
